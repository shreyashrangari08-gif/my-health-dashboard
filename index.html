<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Health</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 70px; }
        .container { padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .val { font-size: 18px; font-weight: bold; color: #3b82f6; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        .sos-btn { background: #ef4444; color: white; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 20px; font-weight: bold; }
        .btn-small { background: #e0e7ff; color: #4338ca; border: none; padding: 10px; border-radius: 10px; width: 48%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Hi, User! 👋</h2>
        <div style="width:40px; height:40px; background:#ddd; border-radius:50%;"></div>
    </div>

    <div class="grid">
        <div class="card"><div class="val">72 bpm</div><div style="font-size:12px;">Heart Rate</div></div>
        <div class="card"><div class="val">98%</div><div style="font-size:12px;">Oxygen</div></div>
    </div>

    <div style="margin-top:20px; display:flex; justify-content:space-between;">
        <button class="btn-small">View Reports</button>
        <button class="btn-small">Medications</button>
    </div>

    <button class="sos-btn">🚨 EMERGENCY SOS</button>
</div>

<div class="nav">
    <span>🏠 Home</span>
    <span>📅 Schedule</span>
    <span>👤 Profile</span>
</div>

</body>
</html>
