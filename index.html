<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>

<div class="top-nav">
    <div onclick="show('home')">🏠 Home</div>
    <div onclick="show('settings')">⚙️ Settings</div>
    <div onclick="show('profile')">👤 Profile</div>
</div>

<!-- Home Section -->
<div id="home">
    <h1>Smart Health</h1>
    <div class="card">❤️ Heart Rate: 72 bpm <br> 🩸 Oxygen: 98%</div>
    <button class="sos-btn">🚨 EMERGENCY SOS</button>
</div>

<!-- Settings Section -->
<div id="settings" class="hidden">
    <h2>Settings</h2>
    <div class="card">
        <p>🔔 Notifications: On</p>
        <p>🔒 Privacy: Enabled</p>
        <button onclick="alert('Logged Out!')">Logout</button>
    </div>
</div>

<!-- Profile Section -->
<div id="profile" class="hidden">
    <h2>My Profile</h2>
    <div class="card">
        <p>Name: Rahul Verma</p>
        <p>Blood Group: O+</p>
        <p>Age: 25</p>
    </div>
</div>

<script>
function show(id) {
    document.getElementById('home').style.display = 'none';
    document.getElementById('settings').style.display = 'none';
    document.getElementById('profile').style.display = 'none';
    document.getElementById(id).style.display = 'block';
}
</script>
</body>
</html>
