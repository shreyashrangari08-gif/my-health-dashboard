<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <title>Smart Health Pro</title>
</head>
<body>
    <nav class="nav">
        <span>🏠 Home</span> <span>📊 Analytics</span> <span>🧪 Lab</span> <span>👤 Profile</span>
    </nav>

    <div class="header">
        <h1>Hello, Rahul! 👋</h1>
        <p>Your Health Score: <span class="score">85/100</span></p>
    </div>

    <div class="grid">
        <div class="card">❤️ 72 BPM<br><small>Heart Rate</small></div>
        <div class="card">🩸 98%<br><small>Oxygen</small></div>
        <div class="card">🌡️ 98.6°F<br><small>Temp</small></div>
        <div class="card">💧 2L<br><small>Water</small></div>
    </div>

    <div class="card ai-chat">
        <h3>🤖 AI Health Assistant</h3>
        <p>Ask me about your symptoms...</p>
    </div>

    <button class="sos-btn">🚨 EMERGENCY SOS</button>

    <script src="app.js"></script>
</body>
</html>
